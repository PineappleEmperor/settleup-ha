add_transaction:
  name: Add Transaction
  description: Add an expense to a Settle Up group.
  fields:
    group:
      name: Group
      description: The Settle Up group to add the transaction to.
      required: true
      selector:
        device:
          integration: settleup
    purpose:
      name: Purpose
      description: Description of the expense.
      required: true
      example: "Dinner"
      selector:
        text:
    amount:
      name: Amount
      description: Total expense amount. Supports templates.
      required: true
      example: "42.50"
      selector:
        template:
    currency_code:
      name: Currency Code
      description: "ISO 4217 currency code. Defaults to the group's configured currency."
      required: false
      example: "GBP"
      selector:
        text:
          type: text
    paid_by:
      name: Paid By
      description: The member who paid.
      required: true
      selector:
        entity:
          integration: settleup
          domain: sensor
          device_class: monetary
    for_members:
      name: Split Between
      description: Members splitting this expense equally.
      required: true
      selector:
        entity:
          integration: settleup
          domain: sensor
          device_class: monetary
          multiple: true
    weights:
      name: Weights
      description: >
        Optional. Relative share per member [2, 1] gives a 2:1 split.
        Cannot be used together with Member Amounts. Supports templates.
      required: false
      example: "[2, 1]"
      selector:
        template:
    member_amounts:
      name: Member Amounts
      description: >
        Optional. Exact amount owed by each member.
        Cannot be used together with Weights. Supports templates.
      required: false
      example: "[20.00, 10.00]"
      selector:
        template:
    category:
      name: Category
      description: Expense category.
      required: false
      default: "general"
      selector:
        select:
          custom_value: true
          options:
            - label: General
              value: general
            - label: Food & Drink
              value: food
            - label: Accommodation
              value: accommodation
            - label: Transport
              value: transport
            - label: Entertainment
              value: entertainment
            - label: Alcohol
              value: alcohol
            - label: Sport
              value: sport
            - label: Health
              value: health
            - label: Household
              value: home

settle_debt:
  name: Settle Debt
  description: Record a debt settlement (transfer) between two members of a Settle Up group.
  fields:
    group:
      name: Group
      description: The Settle Up group the debt belongs to.
      required: true
      selector:
        device:
          integration: settleup
    from_member:
      name: From
      description: The member who is paying (settling their debt).
      required: true
      selector:
        entity:
          integration: settleup
          domain: sensor
          device_class: monetary
    to_member:
      name: To
      description: The member who is being paid.
      required: true
      selector:
        entity:
          integration: settleup
          domain: sensor
          device_class: monetary
    amount:
      name: Amount
      description: The settlement amount.
      required: true
      example: 15.00
      selector:
        number:
          min: 0
          step: 0.01
          mode: box
    currency_code:
      name: Currency Code
      description: "ISO 4217 currency code. Defaults to the group's configured currency."
      required: false
      example: "GBP"
      selector:
        text:
          type: text
